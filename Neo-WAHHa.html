<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Neo-WAHHa — واحة المستقبل | منصة تعليمية تفاعلية لتعليم البرمجة للأطفال">
  <title>Neo-WAHHa — واحة المستقبل</title>

  <!-- Social Media Previews (Open Graph) -->
  <meta property="og:title" content="Neo-WAHHa — واحة المستقبل">
  <meta property="og:description" content="منصة تعليمية تفاعلية لتعليم البرمجة للأطفال. اكتشف عالم HTML و CSS و JS بطريقة ممتعة!">
  <meta property="og:image" content="https://neo-wah-ha.vercel.app/assets/images/logo.png">
  <meta property="og:url" content="https://neo-wah-ha.vercel.app/">
  <meta property="og:type" content="website">

  <!-- Twitter Previews -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Neo-WAHHa — واحة المستقبل">
  <meta name="twitter:description" content="تعلّم البرمجة وابنِ مستقبلك مع Neo-WAHHa">
  <meta name="twitter:image" content="https://neo-wah-ha.vercel.app/assets/images/logo.png">
  
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- CodeMirror 6 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@codemirror/lang-html@6.4.9/dist/index.cjs" defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <!-- Navbar — hidden on login -->
  <nav id="main-navbar" class="navbar hidden">
    <div class="navbar-brand" id="navbar-brand-home" style="cursor: pointer;">
      <div class="logo-frame">
        <img src="assets/images/logo.png" alt="Neo-WAHHa" class="navbar-logo-img">
      </div>
      <span class="navbar-title">Neo-WAHHa</span>
    </div>
    <div class="navbar-links" id="navbar-links">
      <a href="#home" class="nav-link active" data-page="home">
        <span class="nav-icon">🏠</span><span class="nav-text">الرئيسية</span>
      </a>
      <a href="#content" class="nav-link" data-page="content">
        <span class="nav-icon">📚</span><span class="nav-text">المحتوى</span>
      </a>
      <a href="#activities" class="nav-link" data-page="activities">
        <span class="nav-icon">🎮</span><span class="nav-text">الأنشطة</span>
      </a>
      <a href="#exam" class="nav-link" data-page="exam">
        <span class="nav-icon">📝</span><span class="nav-text">الاختبارات</span>
      </a>
      <a href="#profile" class="nav-link" data-page="profile">
        <span class="nav-icon">👤</span><span class="nav-text">المتعلم</span>
      </a>
      <a href="#discussion" class="nav-link" data-page="discussion">
        <span class="nav-icon">💬</span><span class="nav-text">النقاش</span>
      </a>
      <a href="#support" class="nav-link" data-page="support">
        <span class="nav-icon">📞</span><span class="nav-text">الدعم</span>
      </a>
    </div>
    <div class="navbar-user">
      <span id="navbar-username" class="navbar-username"></span>
      <button id="logout-btn" class="btn-logout" title="تسجيل الخروج">🚪</button>
      <div class="navbar-org-logos" style="display: flex; gap: var(--space-2); align-items: center; margin-right: var(--space-4);">
        <img src="assets/images/damietta-logo.jpg" alt="دمياط" style="height: 45px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); box-shadow: 0 0 10px rgba(0, 224, 255, 0.3);">
        <img src="assets/images/etd-logo.jpg" alt="التطوير التكنولوجي" style="height: 45px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); box-shadow: 0 0 10px rgba(0, 224, 255, 0.3);">
        <img src="assets/images/faculty-logo.jpg" alt="الكلية" style="height: 45px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); box-shadow: 0 0 10px rgba(0, 224, 255, 0.3);">
      </div>
    </div>
    <button class="navbar-toggle" id="navbar-toggle">☰</button>
  </nav>

  <!-- Main Content Area -->
  <main id="app" class="app-container"></main>

  <!-- Logo Modal -->
  <div id="logo-modal" class="logo-modal hidden">
    <div class="logo-modal-content">
      <button class="logo-modal-close" id="logo-modal-close">×</button>
      <img src="assets/images/logo.png" alt="Neo-WAHHa Logo" class="logo-modal-img">
      <h2 class="text-gradient" style="margin-top: var(--space-4);">Neo-WAHHa</h2>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data/users.js"></script>
  <script src="js/data/html-course.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/code-editor.js"></script>
  <script src="js/components/quiz.js"></script>
  <script src="js/components/chat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/content.js"></script>
  <script src="js/pages/lesson.js"></script>
  <script src="js/pages/activities.js"></script>
  <script src="js/pages/exam.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/discussion.js"></script>
  <script src="js/pages/support.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
